server:
  port: 8081

spring:
  application:
    name: chj-aigc-gateway-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
    gateway:
      routes:
        - id: tenant-auth-api
          uri: ${TENANT_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/api/auth/**
        - id: tenant-workspace-api
          uri: ${TENANT_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/api/tenant/**
        - id: platform-api
          uri: ${PLATFORM_SERVICE_URI:http://127.0.0.1:8080}
          predicates:
            - Path=/api/**
          filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
        - id: tenant-service
          uri: ${TENANT_SERVICE_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/tenant-api/**
          filters:
            - StripPrefix=1
