# 本地容器化部署（不含 PostgreSQL，数据库使用外部实例）
# 启动命令：docker compose up -d
# 停止命令：docker compose down

services:

  nacos:
    image: nacos/nacos-server:v2.3.2
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./chj-aigc-auth-service
    environment:
      SERVER_PORT: "8083"
      APP_DB_URL: ${APP_DB_URL:-jdbc:postgresql://36.150.108.207:54312/chj-aigc}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-postgres}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-Linten@2023!}
      NACOS_DISCOVERY_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
    ports:
      - "8083:8083"
    depends_on:
      nacos:
        condition: service_healthy

  platform-service:
    build:
      context: ./chj-aigc-platform-service
    environment:
      APP_DB_URL: ${APP_DB_URL:-jdbc:postgresql://36.150.108.207:54312/chj-aigc}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-postgres}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-Linten@2023!}
      NACOS_DISCOVERY_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      AUTH_SERVICE_URI: http://auth-service:8083
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_healthy
      auth-service:
        condition: service_started

  tenant-service:
    build:
      context: ./backend-tenant-service
    environment:
      APP_DB_URL: ${APP_DB_URL:-jdbc:postgresql://36.150.108.207:54312/chj-aigc}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-postgres}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-Linten@2023!}
      NACOS_DISCOVERY_ENABLED: "true"
      NACOS_SERVER_ADDR: nacos:8848
      AUTH_SERVICE_URI: http://auth-service:8083
      AUTH_SESSION_VALIDATION_MODE: remote
    ports:
      - "8082:8082"
    depends_on:
      nacos:
        condition: service_healthy
      auth-service:
        condition: service_started

  gateway:
    build:
      context: ./backend-gateway-service
    environment:
      NACOS_DISCOVERY_ENABLED: "false"
      AUTH_SERVICE_URI: http://auth-service:8083
      PLATFORM_SERVICE_URI: http://platform-service:8080
      TENANT_SERVICE_URI: http://tenant-service:8082
    ports:
      - "8081:8081"
    depends_on:
      - auth-service
      - platform-service
      - tenant-service

  frontend:
    build:
      context: ./frontend-admin
    ports:
      - "80:80"
    depends_on:
      - gateway
