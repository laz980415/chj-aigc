server:
  port: 8082

spring:
  application:
    name: chj-aigc-tenant-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${TENANT_DB_URL:${APP_DB_URL:jdbc:postgresql://36.150.108.207:54312/chj-aigc}}
    username: ${TENANT_DB_USERNAME:${APP_DB_USERNAME:postgres}}
    password: ${TENANT_DB_PASSWORD:${APP_DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-no-trace}] %logger{36} - %msg%n"

auth:
  session-validation:
    mode: ${AUTH_SESSION_VALIDATION_MODE:local}
    auth-service-uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8083}
