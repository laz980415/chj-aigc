server:
  port: 8082

spring:
  application:
    name: chj-aigc-tenant-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

management:
  endpoints:
    web:
      exposure:
        include: health,info
