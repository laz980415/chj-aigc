server:
  port: 8080

spring:
  application:
    name: chj-aigc-platform-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_DISCOVERY_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
  datasource:
    url: ${PLATFORM_DB_URL:${APP_DB_URL:jdbc:postgresql://36.150.108.207:54312/chj-aigc}}
    username: ${PLATFORM_DB_USERNAME:${APP_DB_USERNAME:postgres}}
    password: ${PLATFORM_DB_PASSWORD:${APP_DB_PASSWORD:Linten@2023!}}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId:-no-trace}] %logger{36} - %msg%n"

auth:
  service-uri: ${AUTH_SERVICE_URI:http://127.0.0.1:8083}
